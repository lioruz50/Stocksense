<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockSense">
<title>StockSense Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--s2:#181c24;--border:#1e2433;
  --accent:#c8a84b;--green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;--blue:#4b8ec8;
  --text:#e8eaf0;--muted:#6b7280;
  --fm:'Playfair Display',serif;--mono:'IBM Plex Mono',monospace;--body:'Heebo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;}
.wrap{max-width:1120px;margin:0 auto;padding:15px;position:relative;z-index:1;}
header{padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:25px;}
.logo{font-family:var(--fm);font-size:1.8rem;font-weight:900;color:var(--accent);letter-spacing:-0.5px;}
.logo span{font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:2px;display:block;margin-top:4px;text-transform:uppercase;}
.search-row{display:flex;gap:10px;margin-bottom:12px;}
.si{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:1rem;padding:14px;border-radius:8px;outline:none;transition:all .2s;direction:ltr;}
.si:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(200,168,75,0.1);}
.sb{background:var(--accent);color:#0a0c10;border:none;padding:0 24px;font-family:var(--body);font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;transition:transform 0.1s;}
.sb:active{transform:scale(0.96);}
.sb:disabled{opacity:0.5;}
.qpicks{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:25px;}
.qb{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:.7rem;padding:6px 12px;border-radius:6px;cursor:pointer;}
.err{display:none;background:rgba(231,76,60,0.1);border:1px solid var(--red);color:var(--red);padding:12px;border-radius:8px;margin-bottom:20px;font-size:0.9rem;}
.loading{display:none;text-align:center;padding:40px 0;}
.loading.on,.err.on{display:block;}
.spin{width:35px;height:35px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 15px;}
@keyframes sp{to{transform:rotate(360deg)}}
.res{display:none;}
.res.on{display:block;animation:fadeIn 0.4s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stitle{font-family:var(--mono);font-size:.65rem;color:var(--accent);letter-spacing:2px;margin:30px 0 15px;display:flex;align-items:center;gap:10px;text-transform:uppercase;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:20px;height:280px;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:10px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px;transition:border-color 0.3s;}
.mc.hl{border-color:rgba(200,168,75,0.4);}
.mlb{font-size:.65rem;color:var(--muted);margin-bottom:5px;font-family:var(--mono);}
.mv{font-family:var(--mono);font-size:1.1rem;font-weight:600;}
.vcard{background:var(--surface);border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:12px;padding:20px;margin-top:20px;}
.vscore-big{font-size:2.5rem;font-family:var(--mono);color:var(--accent);font-weight:700;line-height:1;}
.footnote{font-size:0.65rem;color:var(--muted);text-align:center;margin-top:40px;padding-bottom:30px;opacity:0.6;}
@media(max-width:480px){
  .mgrid{grid-template-columns:1fr 1fr;}
  .logo{font-size:1.5rem;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">StockSense <span>// Real-time Fundamental Engine</span></div>
  </header>
  <div class="search-row">
    <input class="si" id="ti" type="text" placeholder="AAPL, TSLA, NVDA..." spellcheck="false" autocomplete="off">
    <button class="sb" id="ab" onclick="go()">נתח</button>
  </div>
  <div class="qpicks">
    <button class="qb" onclick="qs('AAPL')">AAPL</button>
    <button class="qb" onclick="qs('NVDA')">NVDA</button>
    <button class="qb" onclick="qs('TSLA')">TSLA</button>
    <button class="qb" onclick="qs('MSFT')">MSFT</button>
    <button class="qb" onclick="qs('AMZN')">AMZN</button>
    <button class="qb" onclick="qs('MELI')">MELI</button>
  </div>
  <div class="err" id="eb"></div>
  <div class="loading" id="ls"><div class="spin"></div><div class="ltxt">מנתח נתונים בזמן אמת...</div></div>
  <div class="res" id="res">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;">
        <div>
            <h1 id="cn" style="font-size:1.5rem;margin-bottom:4px;">--</h1>
            <div id="tk" style="font-family:var(--mono);color:var(--accent);font-size:0.8rem;">--</div>
        </div>
        <div style="text-align:left;direction:ltr;">
            <div id="cp" style="font-family:var(--mono);font-size:1.8rem;font-weight:700;">--</div>
            <div id="cv" style="font-size:0.85rem;font-family:var(--mono);">--</div>
        </div>
    </div>
    <div class="stitle">// גרף מחיר</div>
    <div class="chart-box"><canvas id="pc"></canvas></div>
    <div class="stitle">// מדדים מרכזיים</div>
    <div class="mgrid" id="mg"></div>
    <div class="stitle">// ניתוח וציון סופי</div>
    <div class="vcard">
        <div style="display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;">
            <div>
                <div id="vt" style="font-size:1rem;line-height:1.6;margin-bottom:10px;">--</div>
                <div id="vb" style="font-weight:700;font-size:1.2rem;">--</div>
            </div>
            <div style="text-align:center;border-right:1px solid var(--border);padding-right:20px;">
                <div class="vscore-big" id="vs">--</div>
                <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Score</div>
            </div>
        </div>
    </div>
    <div class="footnote">נתונים מוצגים בשיטת השווי ההוגן · Yahoo Finance API · לא מהווה ייעוץ השקעות</div>
  </div>
</div>
<script>
let PC=null;
const PROXIES = [
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

async function fetchWithRetry(url) {
    for (let proxyFn of PROXIES) {
        try {
            const resp = await fetch(proxyFn(url));
            if (!resp.ok) continue;
            const data = await resp.json();
            return data.contents ? JSON.parse(data.contents) : data;
        } catch (e) { console.error("Proxy failed, trying next..."); }
    }
    throw new Error("שגיאת חיבור. נסה שוב בעוד רגע.");
}

function qs(t){document.getElementById('ti').value=t;go();}

async function go() {
    const t = document.getElementById('ti').value.trim().toUpperCase();
    if(!t) return;
    
    toggleLoading(true);
    try {
        const [priceData, fundData] = await Promise.all([
            fetchWithRetry(`https://query1.finance.yahoo.com/v8/finance/chart/${t}?range=1mo&interval=1d`),
            fetchWithRetry(`https://query1.finance.yahoo.com/v10/finance/quoteSummary/${t}?modules=financialData,defaultKeyStatistics`)
        ]);

        render(priceData.chart.result[0], fundData.quoteSummary.result[0]);
    } catch (e) {
        showError(e.message);
    } finally {
        toggleLoading(false);
    }
}

function toggleLoading(on) {
    document.getElementById('ls').classList.toggle('on', on);
    document.getElementById('res').classList.toggle('on', !on);
    document.getElementById('eb').classList.remove('on');
    document.getElementById('ab').disabled = on;
}

function showError(m) {
    const e = document.getElementById('eb');
    e.textContent = "⚠ " + m;
    e.classList.add('on');
    document.getElementById('res').classList.remove('on');
}

function render(p, f) {
    const meta = p.meta;
    const fin = f.financialData;
    const stats = f.defaultKeyStatistics;
    const cur = meta.currency === 'USD' ? '$' : meta.currency + ' ';

    document.getElementById('cn').textContent = meta.longName || meta.symbol;
    document.getElementById('tk').textContent = `${meta.symbol} · ${meta.exchangeName}`;
    document.getElementById('cp').textContent = cur + meta.regularMarketPrice.toFixed(2);
    
    const diff = meta.regularMarketPrice - meta.chartPreviousClose;
    const pct = (diff / meta.chartPreviousClose * 100).toFixed(2);
    const cv = document.getElementById('cv');
    cv.textContent = `${pct}% ${diff > 0 ? '▲' : '▼'}`;
    cv.style.color = diff >= 0 ? 'var(--green)' : 'var(--red)';

    const metrics = [
        {l: 'מכפיל רווח P/E', v: stats.trailingPE?.fmt || 'N/A'},
        {l: 'שווי שוק', v: stats.marketCap?.fmt || 'N/A'},
        {l: 'שולי רווח', v: fin.profitMargins?.fmt || 'N/A'},
        {l: 'צמיחת הכנסות', v: fin.revenueGrowth?.fmt || 'N/A'},
        {l: 'חוב/הון', v: stats.debtToEquity?.fmt || 'N/A'},
        {l: 'ROE', v: fin.returnOnEquity?.fmt || 'N/A'}
    ];

    document.getElementById('mg').innerHTML = metrics.map(m => `
        <div class="mc">
            <div class="mlb">${m.l}</div>
            <div class="mv">${m.v}</div>
        </div>
    `).join('');

    renderChart(p, diff >= 0);
    renderVerdict(fin, stats);
}

function renderChart(p, isPos) {
    const ctx = document.getElementById('pc').getContext('2d');
    if(PC) PC.destroy();
    
    const prices = p.indicators.quote[0].close.filter(x => x != null);
    const labels = prices.map((_, i) => i);

    PC = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: prices,
                borderColor: isPos ? '#2ecc71' : '#e74c3c',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                backgroundColor: isPos ? 'rgba(46,204,113,0.1)' : 'rgba(231,76,60,0.1)',
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { grid: { color: '#1e2433' }, ticks: { color: '#6b7280', font: { size: 10 } } } }
        }
    });
}

function renderVerdict(fin, stats) {
    let score = 50;
    if(parseFloat(fin.profitMargins?.raw) > 0.15) score += 20;
    if(parseFloat(fin.revenueGrowth?.raw) > 0.1) score += 15;
    if(parseFloat(stats.trailingPE?.raw) < 25) score += 10;
    
    score = Math.min(98, score);
    document.getElementById('vs').textContent = score;
    
    let text = "ניתוח המערכת: ";
    if(score > 70) {
        text += "החברה מציגה יסודות חזקים מאוד.";
        document.getElementById('vb').textContent = "BUY / אופטימי";
        document.getElementById('vb').style.color = "var(--green)";
    } else {
        text += "יש לבחון נתונים נוספים, התמונה מעורבת.";
        document.getElementById('vb').textContent = "HOLD / ניטרלי";
        document.getElementById('vb').style.color = "var(--yellow)";
    }
    document.getElementById('vt').textContent = text;
}
</script>
</body>
</html>
